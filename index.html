<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球城市時鐘 - 中英雙顯修正版</title>
    <style>
        :root { --primary-color: #2c3e50; --accent-color: #3498db; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 480px; text-align: center; }
        h1 { color: var(--primary-color); margin-bottom: 1.5rem; font-size: 1.5rem; }
        .search-box { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; font-size: 1rem; outline: none; }
        .search-box:focus { border-color: var(--accent-color); }
        select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 1rem; margin-bottom: 20px; background: #fff; cursor: pointer; }
        .display-area { background: var(--primary-color); padding: 30px; border-radius: 15px; color: white; }
        #clock { font-size: 3.2rem; font-weight: bold; font-family: 'Courier New', monospace; margin-bottom: 10px; }
        #date { font-size: 1.1rem; opacity: 0.8; margin-bottom: 15px; }
        .city-info { margin-top: 10px; }
        #city-ch-display { font-size: 1.3rem; font-weight: bold; color: #fff; display: block; margin-bottom: 5px; }
        #city-en-display { font-size: 0.9rem; color: var(--accent-color); font-weight: 500; letter-spacing: 0.5px; }
        #tz-en-path { font-size: 0.7rem; opacity: 0.4; margin-top: 15px; display: block; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h1>🌍 全球時間查詢</h1>
    <input type="text" id="search" class="search-box" placeholder="搜尋國家、城市或簡寫...">
    <select id="timezone-select"></select>

    <div class="display-area">
        <div id="clock">00:00:00</div>
        <div id="date">載入中...</div>
        <div class="city-info">
            <span id="city-ch-display">台北, 台灣</span>
            <span id="city-en-display">Taipei, Taiwan</span>
        </div>
        <span id="tz-en-path">Asia/Taipei</span>
    </div>
</div>

<script>
    // 終極手寫對照表：[中文顯示, 英文顯示, 搜尋關鍵字]
    const manualList = {
        // --- 非洲 ---
        "Africa/Cairo": ["開羅, 埃及", "Cairo, Egypt", "埃及 開羅 Egypt Cairo"],
        "Africa/Johannesburg": ["約翰尼斯堡, 南非", "Johannesburg, South Africa", "南非 約翰尼斯堡 South Africa"],
        "Africa/Nairobi": ["奈洛比, 肯亞", "Nairobi, Kenya", "肯亞 奈洛比 Kenya Nairobi"],
        // --- 美洲 ---
        "America/Anchorage": ["安克拉治, 阿拉斯加", "Anchorage, Alaska", "美國 阿拉斯加 Alaska"],
        "America/Chicago": ["芝加哥, 美國 (中部)", "Chicago, USA (Central)", "美國 芝加哥 USA Chicago"],
        "America/Denver": ["丹佛, 美國 (山區)", "Denver, USA (Mountain)", "美國 丹佛 USA Denver"],
        "America/Los_Angeles": ["洛杉磯, 美國 (西岸)", "Los Angeles, USA (Pacific)", "美國 洛杉磯 USA Los Angeles LA"],
        "America/New_York": ["紐約, 美國 (東岸)", "New York, USA (Eastern)", "美國 紐約 USA New York East"],
        "America/San_Francisco": ["舊金山, 美國", "San Francisco, USA", "美國 舊金山 San Francisco SF"],
        "America/Toronto": ["多倫多, 加拿大", "Toronto, Canada", "加拿大 多倫多 Canada Toronto"],
        "America/Vancouver": ["溫哥華, 加拿大", "Vancouver, Canada", "加拿大 溫哥華 Canada Vancouver"],
        "Pacific/Honolulu": ["檀香山, 夏威夷", "Honolulu, Hawaii", "美國 夏威夷 Hawaii"],
        // --- 亞洲 ---
        "Asia/Bangkok": ["曼谷, 泰國", "Bangkok, Thailand", "泰國 曼谷 Thailand Bangkok"],
        "Asia/Dubai": ["杜拜, 阿聯酋", "Dubai, UAE", "杜拜 阿拉伯聯合大公國 Dubai UAE"],
        "Asia/Ho_Chi_Minh": ["胡志明市, 越南", "Ho Chi Minh City, Vietnam", "越南 胡志明市 Vietnam HCM"], 
        "Asia/Hong_Kong": ["香港, 中國", "Hong Kong", "香港 HK Hong Kong"],
        "Asia/Jakarta": ["雅加達, 印尼", "Jakarta, Indonesia", "印尼 雅加達 Jakarta"],
        "Asia/Kolkata": ["加爾各答, 印度", "Kolkata, India", "印度 India Kolkata"],
        "Asia/Kuala_Lumpur": ["吉隆坡, 馬來西亞", "Kuala Lumpur, Malaysia", "馬來西亞 吉隆坡 Malaysia KL"],
        "Asia/Makassar": ["峇里島, 印尼", "Bali, Indonesia", "印尼 峇里島 Indonesia Bali"],
        "Asia/Manila": ["馬尼拉, 菲律賓", "Manila, Philippines", "菲律賓 馬尼拉 Philippines Manila"],
        "Asia/Seoul": ["首爾, 韓國", "Seoul, Korea", "韓國 首爾 Korea Seoul"],
        "Asia/Shanghai": ["上海, 中國", "Shanghai, China", "上海 中國 China Shanghai"],
        "Asia/Singapore": ["新加坡", "Singapore", "新加坡 Singapore"],
        "Asia/Taipei": ["台北, 台灣", "Taipei, Taiwan", "台灣 台北 Taiwan Taipei"],
        "Asia/Tokyo": ["東京, 日本", "Tokyo, Japan", "日本 東京 Japan Tokyo"],
        // --- 澳洲 ---
        "Australia/Perth": ["伯斯, 澳洲", "Australia, Perth","澳洲 伯斯 Australia Perth"],
        "Australia/Sydney": ["雪梨, 澳洲", "Australia, Sydney","澳洲 雪梨 Australia Sydney"],
        "Australia/Melbourne": ["墨爾本, 澳洲", "Australia, Melbourne", "澳洲 墨爾本 Australia Melbourne"],
        // --- 歐洲 ---
        "Europe/Amsterdam": ["阿姆斯特丹, 荷蘭", "Amsterdam", "荷蘭 Amsterdam"],
        "Europe/Berlin": ["柏林, 德國", "Germany, Berlin", "德國 柏林 Germany Berlin"],
        "Europe/London": ["倫敦, 英國", "London, England", "英國 倫敦 UK London England"],
        "Europe/Madrid": ["馬德里, 西班牙", "Spain, Madrid", "西班牙 馬德里 Spain Madrid"],
        "Europe/Moscow": ["莫斯科, 俄羅斯", "Russia, Moscow", "俄羅斯 莫斯科 Russia Moscow"],
        "Europe/Paris": ["巴黎, 法國", "France, Paris", "法國 巴黎 France Paris"],
        "Europe/Rome": ["羅馬, 義大利", "Italy, Rome", "義大利 羅馬 Italy Rome"],
        "Europe/Zurich": ["蘇黎世, 瑞士", "Switzerland, Zurich", "瑞士 蘇黎世 Switzerland Zurich"],
        // --- 大洋洲 ---
        "Pacific/Auckland": ["奧克蘭, 紐西蘭", "New Zealand", "紐西蘭 奧克蘭 New Zealand"]
    };

    const select = document.getElementById('timezone-select');
    const searchInput = document.getElementById('search');

    function renderOptions(filter = '') {
        const currentVal = select.value;
        select.innerHTML = '';
        const sortedKeys = Object.keys(manualList).sort();

        sortedKeys.forEach(tz => {
            const [ch, en, keywords] = manualList[tz];
            if (keywords.toLowerCase().includes(filter.toLowerCase()) || ch.includes(filter) || en.toLowerCase().includes(filter.toLowerCase())) {
                const option = document.createElement('option');
                option.value = tz;
                option.textContent = `${ch} (${en})`;
                select.appendChild(option);
            }
        });
        
        if (select.options.length === 0) {
            const option = document.createElement('option');
            option.textContent = "找不到相關城市";
            select.appendChild(option);
        } else if (currentVal) {
            select.value = currentVal;
        }
    }

    function updateTime() {
        const timezone = select.value;
        if (!timezone || timezone === "找不到相關城市") return;

        const now = new Date();
        const timeStr = new Intl.DateTimeFormat('zh-TW', { timeZone: timezone, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }).format(now);
        const dateStr = new Intl.DateTimeFormat('zh-TW', { timeZone: timezone, year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' }).format(now);
        
        const [ch, en] = manualList[timezone];
        document.getElementById('clock').textContent = timeStr;
        document.getElementById('date').textContent = dateStr;
        document.getElementById('city-ch-display').textContent = ch;
        document.getElementById('city-en-display').textContent = en;
        document.getElementById('tz-en-path').textContent = timezone;
    }

    searchInput.addEventListener('input', (e) => {
        renderOptions(e.target.value);
        updateTime();
    });
    select.addEventListener('change', updateTime);

    renderOptions();
    select.value = 'Asia/Taipei';
    setInterval(updateTime, 1000);
    updateTime();
</script>

</body>
</html>

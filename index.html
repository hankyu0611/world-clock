<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球自動中文化時鐘</title>
    <style>
        :root { --primary-color: #2c3e50; --accent-color: #e67e22; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        h1 { color: var(--primary-color); margin-bottom: 1.5rem; font-size: 1.6rem; }
        .search-box { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; font-size: 1rem; outline: none; transition: 0.3s; }
        .search-box:focus { border-color: var(--accent-color); }
        select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 1rem; margin-bottom: 20px; background: #fff; }
        .display-area { background: var(--primary-color); padding: 35px; border-radius: 15px; color: white; box-shadow: inset 0 0 20px rgba(0,0,0,0.2); }
        #clock { font-size: 3.2rem; font-weight: bold; font-family: 'Courier New', monospace; margin-bottom: 10px; letter-spacing: 2px; }
        #date { font-size: 1.1rem; opacity: 0.9; margin-bottom: 15px; }
        #city-ch { font-size: 1.4rem; font-weight: bold; color: var(--accent-color); background: #fff; display: inline-block; padding: 5px 20px; border-radius: 25px; margin-bottom: 10px; }
        #timezone-en { font-size: 0.8rem; opacity: 0.5; }
    </style>
</head>
<body>

<div class="card">
    <h1>🌍 全球自動翻譯時鐘</h1>
    <input type="text" id="search" class="search-box" placeholder="搜尋城市中文或英文...">
    <select id="timezone-select"></select>

    <div class="display-area">
        <div id="clock">00:00:00</div>
        <div id="date">讀取中...</div>
        <div id="city-ch">台北時間</div>
        <div id="timezone-en">Asia/Taipei</div>
    </div>
</div>

<script>
    const select = document.getElementById('timezone-select');
    const searchInput = document.getElementById('search');
    
    // 關鍵：使用瀏覽器內建的翻譯器
    const regionNames = new Intl.DisplayNames(['zh-TW'], { type: 'region' });
    const allTimezones = Intl.supportedValuesOf('timeZone');

    // 格式化顯示名稱的函式
    function getChineseName(tz) {
        try {
            // 嘗試取得該時區的中文長格式 (例如：台北時間)
            const formatter = new Intl.DateTimeFormat('zh-TW', {
                timeZone: tz,
                timeZoneName: 'long'
            });
            const parts = formatter.formatToParts(new Date());
            const tzName = parts.find(p => p.type === 'timeZoneName').value;
            
            // 處理一些顯示上的優化，把底線換成空格，讓英文部分也好讀
            const cleanEn = tz.split('/').pop().replace('_', ' ');
            return { full: `${cleanEn} (${tzName})`, simple: tzName };
        } catch (e) {
            return { full: tz, simple: tz };
        }
    }

    function renderOptions(filter = '') {
        const currentVal = select.value;
        select.innerHTML = '';
        
        allTimezones.forEach(tz => {
            const names = getChineseName(tz);
            if (tz.toLowerCase().includes(filter.toLowerCase()) || names.simple.includes(filter)) {
                const option = document.createElement('option');
                option.value = tz;
                option.textContent = names.full;
                select.appendChild(option);
            }
        });
        
        if (currentVal && Array.from(select.options).some(o => o.value === currentVal)) {
            select.value = currentVal;
        }
    }

    function updateTime() {
        const timezone = select.value;
        if (!timezone) return;

        const now = new Date();
        const timeStr = new Intl.DateTimeFormat('zh-TW', { timeZone: timezone, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }).format(now);
        const dateStr = new Intl.DateTimeFormat('zh-TW', { timeZone: timezone, year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' }).format(now);
        
        const names = getChineseName(timezone);

        document.getElementById('clock').textContent = timeStr;
        document.getElementById('date').textContent = dateStr;
        document.getElementById('city-ch').textContent = names.simple;
        document.getElementById('timezone-en').textContent = timezone;
    }

    searchInput.addEventListener('input', (e) => renderOptions(e.target.value));
    select.addEventListener('change', updateTime);

    // 初始化
    renderOptions();
    select.value = 'Asia/Taipei';
    setInterval(updateTime, 1000);
    updateTime();
</script>

</body>
</html>

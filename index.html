<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球城市時鐘搜尋</title>
    <style>
        :root { --primary-color: #4a90e2; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #333; margin-bottom: 1.5rem; font-size: 1.6rem; }
        
        /* 搜尋與選擇框樣式 */
        .search-box { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; font-size: 1rem; outline: none; transition: border-color 0.3s; }
        .search-box:focus { border-color: var(--primary-color); }
        
        select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 1rem; background: #fafafa; cursor: pointer; margin-bottom: 20px; }

        /* 時鐘顯示 */
        .display-area { background: #f8f9fa; padding: 20px; border-radius: 15px; border-left: 5px solid var(--primary-color); }
        #clock { font-size: 2.5rem; font-weight: 700; color: #222; font-family: 'Courier New', Courier, monospace; }
        #date { color: #666; margin-top: 5px; font-size: 0.95rem; }
        #timezone-name { margin-top: 15px; font-size: 0.8rem; color: #999; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="card">
    <h1>🌍 全球城市時鐘</h1>
    
    <input type="text" id="search" class="search-box" placeholder="搜尋城市 (如: New York, London...)">
    
    <select id="timezone-select"></select>

    <div class="display-area">
        <div id="clock">00:00:00</div>
        <div id="date">載入中...</div>
        <div id="timezone-name">UTC</div>
    </div>
</div>

<script>
    const select = document.getElementById('timezone-select');
    const searchInput = document.getElementById('search');
    const clockEl = document.getElementById('clock');
    const dateEl = document.getElementById('date');
    const nameEl = document.getElementById('timezone-name');

    // 1. 取得瀏覽器支援的所有時區名稱
    const allTimezones = Intl.supportedValuesOf('timeZone');

    // 2. 渲染選單的函式
    function renderOptions(filter = '') {
        const currentSelection = select.value;
        select.innerHTML = '';
        
        const filtered = allTimezones.filter(tz => 
            tz.toLowerCase().includes(filter.toLowerCase())
        );

        filtered.forEach(tz => {
            const option = document.createElement('option');
            option.value = tz;
            // 將 "America/Los_Angeles" 取代為 "America - Los Angeles" 比較好讀
            option.textContent = tz.replace('_', ' ').replace('/', ' - ');
            select.appendChild(option);
        });

        if (filtered.length === 0) {
            const option = document.createElement('option');
            option.textContent = "找不到相關城市";
            select.appendChild(option);
        }
    }

    // 3. 更新時間的函式
    function updateTime() {
        const timezone = select.value;
        if (!timezone || timezone === "找不到相關城市") return;

        const now = new Date();
        
        try {
            const timeStr = new Intl.DateTimeFormat('zh-TW', {
                timeZone: timezone,
                hour: '2-digit', minute: '2-digit', second: '2-digit',
                hour12: false
            }).format(now);

            const dateStr = new Intl.DateTimeFormat('zh-TW', {
                timeZone: timezone,
                year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'
            }).format(now);

            clockEl.textContent = timeStr;
            dateEl.textContent = dateStr;
            nameEl.textContent = timezone;
        } catch (e) {
            console.error("時區錯誤", e);
        }
    }

    // 搜尋輸入監聽
    searchInput.addEventListener('input', (e) => {
        renderOptions(e.target.value);
        updateTime();
    });

    // 選單切換監聽
    select.addEventListener('change', updateTime);

    // 初始化
    renderOptions();
    // 預設選中台北 (如果有的話)
    if (allTimezones.includes('Asia/Taipei')) {
        select.value = 'Asia/Taipei';
    }
    
    setInterval(updateTime, 1000);
    updateTime();
</script>

</body>
</html>
